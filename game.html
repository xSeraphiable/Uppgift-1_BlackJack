<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Jack</title>
    <script src="./js/app.js" defer></script>
    <link rel="stylesheet" href="./Styles/game.css">
</head>
<body>
    <header>
       
            <h1>Black Jack</h1>
      
    </header>
    <main>
        <section class="containerGame">

            <!--Computer/dealer-->
            <div class="computer">
                <h2>Dealer</h2>        
                <p>Poäng: <span id="computerPoints"></span></p>
                <div id="cHand"></div>
            </div>

            <!--Player-->
            <div class="player">
                <h2>Spelare</h2>
                <p>Poäng <span id="points"></span> </p>
                <div id="pHand"></div>
            </div>

            <!--Game controls-->
            <div class="controls">
                <button id="draw">Dra kort</button>
                <button id="stop">Stanna</button>
            </div>

            <!--Betting controls-->
            <div class="betting">
                <label for="bet">Ange insats:</label>
                <input type="number" id="bet" name="bet" min="10" max="500" value="10"/>
                <button id="betButton">Satsa</button>
                <p>Din satsning: <span id="yourBet"></span> </p>
                </p>
            </div>
            
            <!--Result-->
            <div class="result">
                <p id="resultMessage"></p>
            </div>

            <div class="gameFooter">
                <!--Balance / deposit-->
                <div class="balanceDiv">
                    <label>Saldo</label><p id="balance"></p>
                    <input type="number" id="deposit" name="Deposit" min="100" max="10000" value="100"/>
                    <button id="depositButton">Sätt in</button>    
                </div>
                
                <!--User and user control-->
                <div class="userinfo">
                    <p>Inloggad som: <span id="user"></span></p>
                    <button id="logout">Logga ut</button>
                </div>
            </div>
        </section>

    </main>

</body>
</html>
