<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Jack</title>
    <script src="./js/login.js" defer></script>
    <link rel="stylesheet" href="./Styles/index.css">
</head>
<body >
    <header>
       
            <h1>Black Jack</h1>
        
    </header>
    <main  class="loginPage">
        <section class="loginContainer">
            <form class="loginForm" id="loginForm">
            <label for="username">Användarnamn:</label>
            <input type="text" id="username" placeholder="Ange användarnamn" autocomplete="off">
            
            <label for="pwd">Lösenord:</label>
            <input type="password" id="pwd">
            
            <input type="submit" id="submit" value="Logga in / Skapa konto"/>
            
            <p class="info" id="info">Om användarnamnet inte finns skapas kontot automatiskt</p>
            </form>           
            
        </section>


    </main>

</body>
</html>
